<!DOCTYPE html>
<html lang="id">
<head> 
    <meta charset="UTF-8">
    <title>Konversi Kalender</title>
    <style>
        body { 
            background-color: #1b263b; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(224, 225, 221, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(229, 152, 10, 0.05) 0%, transparent 40%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        } 
        .main-container { max-width: 550px; width: 100%; background: rgba(27, 38, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 35px 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); text-align: center; box-sizing: border-box; }
        h1 { color: #e0e1dd; font-family: 'Rekaa', Arial, sans-serif; font-size: 26px; margin: 0 0 8px 0; letter-spacing: 1px; } 
        h2 { color: #8d99ae; font-family: Arial, sans-serif; font-size: 14px; font-weight: normal; margin: 0 0 30px 0; } 
        .form-block { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 18px; margin-bottom: 22px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .block-title { font-size: 13px; font-weight: bold; text-align: left; margin-bottom: 14px; color: #e5980a; display: flex; align-items: center; }
        .block-title::before { content: ""; display: inline-block; width: 4px; height: 14px; background-color: #e5980a; margin-right: 8px; border-radius: 2px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .input-group { flex: 1; text-align: left; }
        .input-group label { font-size: 11px; display: block; margin-bottom: 5px; font-weight: bold; color: #8d99ae; text-transform: uppercase; } 
        .input-group input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; text-align: center; font-size: 15px; font-weight: bold; color: #ffffff; background-color: rgba(255, 255, 255, 0.05); }
        .input-group input:focus { outline: none; border-color: #e5980a; background-color: rgba(255, 255, 255, 0.08); }
        .button-group { text-align: right; }
        button { color: #1b263b; background-color: #e5980a; font-family: Arial, sans-serif; font-weight: bold; border: none; padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 8px; transition: all 0.2s; } 
        button:hover { background-color: #fca311; transform: translateY(-1px); }
        .output-box { background: rgba(229, 152, 10, 0.1); border: 1px dashed #e5980a; border-radius: 8px; padding: 14px; margin: 22px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        p { color: #ffffff; font-size: 15px; font-family: 'Courier New', Courier, monospace; margin: 0; font-weight: bold; line-height: 1.5; }
        .footer { font-size: 12px; color: #8d99ae; font-weight: bold; margin-top: 30px; border-top: 1px dashed rgba(255, 255, 255, 0.1); padding-top: 18px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>KONVERSI KALENDER</h1>
    <h2>
        Oleh : M. SHOLEH BAKHRUDDIN <br>
        <span style="font-weight: bold; color: #4a548c; display: inline-block; margin-top: 4px;"></span>
    </h2>

    <div class="form-block">
        <div class="block-title">Input Tanggal Masehi</div>
        <div class="input-row">
            <div class="input-group">
                <label>Tanggal Masehi</label>
                <input value="20" type="number" id="tglM">
            </div>
            <div class="input-group">
                <label>Bulan Masehi</label>
                <input value="6" type="number" id="blnM">
            </div>
            <div class="input-group">
                <label>Tahun Masehi</label>
                <input value="2026" type="number" id="thnM">
            </div>
        </div>
        <div class="button-group">
            <button onclick="BtHitungM()">Proses</button> 
            <button onclick="BtHapusM()">Hapus</button> 
        </div>
    </div>

    <div class="output-box">
        <p><span id="Hasil1">Hasil Masehi akan muncul di sini...</span></p>
    </div>

    <div class="form-block">
        <div class="block-title">Input Tanggal Hijriyah</div>
        <div class="input-row">
            <div class="input-group">
                <label>Tanggal Hijriyah</label>
                <input value="4" type="number" id="tglH">
            </div>
            <div class="input-group">
                <label>Bulan Hijriyah</label>
                <input value="1" type="number" id="blnH">
            </div>
            <div class="input-group">
                <label>Tahun Hijriyah</label>
                <input value="1448" type="number" id="thnH">
            </div>
        </div>
        <div class="button-group">
            <button onclick="BtHitungH()">Proses</button> 
            <button onclick="BtHapusH()">Hapus</button> 
        </div>
    </div>

    <div class="output-box">
        <p><span id="Hasil2">Hasil Hijriyah akan muncul di sini...</span></p>
    </div>

    <div class="footer">
        _____ SEMOGA BERMANFAAT🙏😊 _____
    </div>
</div>

<script>
// --- Data Master ---
var namaHari = ["Ahad", "Senin", "Selasa", "Rabu", "Kamis", "Jum'at", "Sabtu"];
var namaPasaran = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
var namaBulanM = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
var namaBulanH = ["", "Muharram", "Shafar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadhan", "Syawal", "Dzulqo'dah", "Dzulhijjah"];

// --- Fungsi Tombol Hapus ---
function BtHapusM(){ document.getElementById("Hasil1").innerHTML = "<i><b>Data Terhapus</b></i>"; }
function BtHapusH(){ document.getElementById("Hasil2").innerHTML = "<i><b>Data Terhapus</b></i>"; }

// --- Algoritma Julian Day (Menghitung Masehi) ---
function hitungJDMasehi(D, M, Y) {
    var y = Y;
    var m = M;
    if (m <= 2) { 
        y -= 1; 
        m += 12; 
    }
    var A = Math.floor(y / 100);
    var B = 2 - A + Math.floor(A / 4);
    return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + D + B - 1524;
}

// --- Algoritma Julian Day (Menghitung Hijriyah) ---
function hitungJDHijri(D, M, Y) {
    return Math.floor((11 * Y + 3) / 30) + 354 * Y + 30 * M - Math.floor((M - 1) / 2) + D + 1948440 - 385;
}

// --- Konversi Balik: JD -> Masehi ---
function JDtoMasehi(JD) {
    var Z = Math.floor(JD);
    var alpha = Math.floor((Z - 1867216.25) / 36524.25);
    var A = Z < 2299161 ? Z : Z + 1 + alpha - Math.floor(alpha / 4);
    var B = A + 1524;
    var C = Math.floor((B - 122.1) / 365.25);
    var D = Math.floor(365.25 * C);
    var E = Math.floor((B - D) / 30.6001);
    
    var d = B - D - Math.floor(30.6001 * E);
    var m = E < 14 ? E - 1 : E - 13;
    var y = m > 2 ? C - 4716 : C - 4715;
    
    return { d: d, m: m, y: y };
}

// --- Konversi Balik: JD -> Hijriyah ---
function JDtoHijri(JD) {
    var H = JD - 1948440;
    var L1 = H + 10632;
    var N = Math.floor((L1 - 1) / 10631);
    var L2 = L1 - 10631 * N + 354;
    var J = Math.floor((10985 - L2) / 5316) * Math.floor((50 * L2) / 17719) + Math.floor(L2 / 5670) * Math.floor((43 * L2) / 15238);
    var L3 = L2 - Math.floor((30 - J) / 15) * Math.floor((17719 * J) / 50) - Math.floor(J / 16) * Math.floor((15238 * J) / 43) + 29;
    var m = Math.floor((24 * L3) / 709);
    var d = L3 - Math.floor((709 * m) / 24);
    var y = 30 * N + J - 30;
    
    return { d: d, m: m, y: y };
}

// --- Output Formatting ---
function formatOutput(JD, dM, mM, yM, dH, mH, yH) {
    var hrIdx = JD % 7;
    var psIdx = JD % 5;
    
    if (hrIdx < 0) hrIdx += 7;
    if (psIdx < 0) psIdx += 5;
    
    var hari = namaHari[hrIdx];
    var pasaran = namaPasaran[psIdx];
    
    // Perbaikan: Rumus standar Tahun Saka (Masehi - 78). Jika Jan/Feb sebelum Nyepi, dikurangi 79.
    var tahunSaka = (mM <= 2) ? (yM - 79) : (yM - 78);
    
    // Rumus Kalender Jawa Peninggalan Sultan Agung (Hijriyah + 512).
    var tahunJawa = yH + 512;
    
    var stringOut = hari + " " + pasaran + ", " + dM + " " + namaBulanM[mM] + " " + yM + " M <br>" + 
                    "<span style='color:#e5980a; font-size:14px; font-weight:normal;'>" + 
                    dH + " " + namaBulanH[mH] + " " + yH + " H / " + tahunSaka + " Saka / " + tahunJawa + " Jawa</span>";
                    
    return stringOut;
}

// --- Eksekusi Tombol Proses Masehi ---
function BtHitungM() {
    var tglM = parseInt(document.getElementById("tglM").value);
    var blnM = parseInt(document.getElementById("blnM").value);
    var thnM = parseInt(document.getElementById("thnM").value);
    
    if(!tglM || !blnM || !thnM) { 
        document.getElementById("Hasil1").innerHTML = "Data tidak valid"; 
        return; 
    }
    
    var JD = hitungJDMasehi(tglM, blnM, thnM);
    var hijri = JDtoHijri(JD);
    
    var hasil = formatOutput(JD, tglM, blnM, thnM, hijri.d, hijri.m, hijri.y);
    document.getElementById("Hasil1").innerHTML = hasil;
}

// --- Eksekusi Tombol Proses Hijriyah ---
function BtHitungH() {
    var tglH = parseInt(document.getElementById("tglH").value);
    var blnH = parseInt(document.getElementById("blnH").value);
    var thnH = parseInt(document.getElementById("thnH").value);
    
    if(!tglH || !blnH || !thnH) { 
        document.getElementById("Hasil2").innerHTML = "Data tidak valid"; 
        return; 
    }
    
    var JD = hitungJDHijri(tglH, blnH, thnH);
    var masehi = JDtoMasehi(JD);
    
    var hasil = formatOutput(JD, masehi.d, masehi.m, masehi.y, tglH, blnH, thnH);
    document.getElementById("Hasil2").innerHTML = hasil;
}
</script>
</body>
</html>
